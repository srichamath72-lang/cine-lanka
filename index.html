<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineLanka - Movies from Sri Lanka & the World</title>
<style>
:root{--bg:#09090b;--card:#18181b;--card2:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--text:#fff;--dim:#a1a1aa;--dimmer:#71717a;--p1:#a855f7;--p2:#ec4899;--amber:#fbbf24;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit;}
input{font-family:inherit;}
.container{max-width:1280px;margin:0 auto;padding:0 16px;}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(20px);background:rgba(9,9,11,.85);border-bottom:1px solid var(--border);}
.navbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;height:64px;}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;flex-shrink:0;}
.logo-icon{padding:6px;border-radius:8px;background:linear-gradient(135deg,var(--p1),var(--p2));display:flex;align-items:center;font-size:16px;}
.gradient-text{background:linear-gradient(90deg,#c084fc,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent;}
.nav-links{display:none;align-items:center;gap:4px;}
.nav-link{padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--dim);transition:.2s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.nav-link:hover{color:var(--text);}
.nav-link.active{color:var(--text);background:var(--card2);}
.badge-count{font-size:11px;background:var(--p1);color:#fff;border-radius:999px;padding:0 6px;}
.search-wrap{display:none;position:relative;flex:1;max-width:260px;}
.search-input{width:100%;background:var(--card2);border:1px solid var(--border);outline:none;border-radius:8px;padding:9px 32px 9px 36px;font-size:14px;color:var(--text);transition:.2s;}
.search-input::placeholder{color:var(--dimmer);}
.search-input:focus{border-color:var(--p1);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dimmer);pointer-events:none;font-size:13px;}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--dimmer);padding:4px;}
.signin-btn{display:none;padding:9px 18px;border-radius:8px;background:linear-gradient(90deg,var(--p1),var(--p2));font-size:14px;font-weight:600;white-space:nowrap;color:#fff;}
.menu-btn{padding:8px;color:var(--dim);font-size:22px;line-height:1;}
.mobile-menu{border-top:1px solid var(--border);padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.mobile-menu .nav-link{justify-content:flex-start;}
.mobile-search{position:relative;margin-bottom:4px;}
@media (min-width:768px){.nav-links{display:flex;}.search-wrap{display:block;}.signin-btn{display:block;}.menu-btn{display:none;}}

/* HERO */
.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.hero-bg{position:absolute;inset:0;opacity:.3;}
.hero-blob{position:absolute;width:380px;height:380px;border-radius:50%;filter:blur(80px);opacity:.2;}
.hero-blob1{top:-100px;left:-100px;background:var(--p1);}
.hero-blob2{bottom:-100px;right:-100px;background:var(--p2);}
.hero-content{position:relative;max-width:680px;padding:56px 0;}
.hero-tags{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;}
.tag-featured{background:linear-gradient(90deg,var(--p1),var(--p2));}
.tag-soft{background:var(--card2);font-weight:600;}
.hero-title{font-size:36px;font-weight:800;line-height:1.1;margin-bottom:16px;}
.hero-meta{display:flex;gap:16px;font-size:14px;color:var(--dim);margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.rating{display:flex;align-items:center;gap:4px;font-weight:700;color:var(--amber);}
.hero-desc{color:var(--dim);font-size:15px;line-height:1.7;margin-bottom:24px;}
.hero-buttons{display:flex;gap:12px;flex-wrap:wrap;}
.btn{display:flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-weight:700;font-size:14px;transition:.2s;}
.btn-white{background:#fff;color:#000;}
.btn-white:hover{background:#e4e4e7;}
.btn-outline{background:transparent;color:#fff;border:1px solid var(--border);}
.btn-outline:hover{background:var(--card2);}
.btn-gradient{background:linear-gradient(90deg,var(--p1),var(--p2));color:#fff;}
@media (min-width:640px){.hero-title{font-size:56px;}}

/* STATS */
.stats{border-bottom:1px solid var(--border);background:rgba(24,24,27,.4);}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;padding:24px 0;text-align:center;}
.stat-num{font-size:24px;font-weight:800;background:linear-gradient(90deg,#c084fc,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-label{font-size:13px;color:var(--dim);margin-top:4px;}
@media (min-width:640px){.stats-grid{grid-template-columns:repeat(4,1fr);}.stat-num{font-size:30px;}}

/* TABS & CHIPS */
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.tab{padding:9px 16px;border-radius:999px;font-size:14px;font-weight:600;background:var(--card2);color:var(--dim);border:1px solid var(--border);transition:.2s;}
.tab.active{background:linear-gradient(90deg,var(--p1),var(--p2));color:#fff;border-color:transparent;}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;background:var(--card2);color:var(--dim);border:1px solid var(--border);white-space:nowrap;}
.chip.active{background:#fff;color:#000;border-color:#fff;}

/* SECTIONS */
main{padding:32px 16px;max-width:1280px;margin:0 auto;min-height:300px;}
.section{margin-bottom:48px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;}
.section-title{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;}
.view-all{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--p1);white-space:nowrap;}

/* GRID & CARD */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px;}
.card{cursor:pointer;}
.poster-wrap{position:relative;aspect-ratio:2/3;border-radius:12px;overflow:hidden;border:1px solid var(--border);transition:.25s;}
.card:hover .poster-wrap{border-color:rgba(192,132,252,.7);transform:scale(1.03);box-shadow:0 20px 40px rgba(0,0,0,.4);}
.poster-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:46px;opacity:.18;}
.poster-shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92),rgba(0,0,0,.05) 60%,transparent);}
.poster-info{position:absolute;bottom:0;left:0;right:0;padding:10px;}
.poster-title{font-weight:700;font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.poster-year{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;}
.poster-rating{position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);border-radius:999px;padding:3px 7px;font-size:11px;font-weight:700;color:var(--amber);}
.poster-bookmark{position:absolute;top:8px;left:8px;padding:6px;border-radius:999px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);font-size:13px;transition:.2s;line-height:1;}
.poster-bookmark.active{background:var(--p1);}
.poster-tagbadge{position:absolute;top:38px;left:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:linear-gradient(90deg,var(--p1),var(--p2));color:#fff;}
.poster-rank{position:absolute;bottom:0;left:4px;font-size:38px;font-weight:900;color:rgba(255,255,255,.9);text-shadow:2px 2px 0 rgba(0,0,0,.5);line-height:1;}
.poster-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:.2s;}
.card:hover .poster-play{opacity:1;}
.poster-play-btn{background:#fff;color:#000;border-radius:999px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.card-meta{margin-top:8px;}
.card-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-sub{font-size:12px;color:var(--dim);}

/* EMPTY */
.empty{text-align:center;padding:56px 16px;border-radius:16px;border:1px dashed var(--border);background:rgba(24,24,27,.4);}
.empty-icon{font-size:36px;opacity:.4;margin-bottom:12px;}
.empty-title{color:var(--dim);font-weight:600;}
.empty-sub{color:var(--dimmer);font-size:13px;margin-top:4px;margin-bottom:16px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);}
.modal{position:relative;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border-radius:16px;background:var(--card);border:1px solid var(--border);}
.modal-hero{position:relative;height:180px;display:flex;align-items:flex-end;}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.4);border-radius:999px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.modal-shade{position:absolute;inset:0;background:linear-gradient(to top,var(--card),rgba(24,24,27,.2),transparent);}
.modal-titlewrap{position:relative;padding:0 24px 16px;}
.modal-tags{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.modal-title{font-size:24px;font-weight:800;}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:18px;}
.modal-meta{display:flex;gap:16px;font-size:14px;color:var(--dim);align-items:center;flex-wrap:wrap;}
.genre-tags{display:flex;gap:8px;flex-wrap:wrap;}
.genre-tag{font-size:12px;font-weight:500;padding:5px 12px;border-radius:999px;background:var(--card2);border:1px solid var(--border);}
.modal-desc{color:var(--dim);line-height:1.7;font-size:14px;}
.modal-row{font-size:14px;color:var(--dim);}
.modal-row b{color:var(--text);font-weight:600;}
.modal-actions{display:flex;gap:12px;flex-wrap:wrap;}

/* NEWSLETTER */
.newsletter{position:relative;overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.newsletter-bg{position:absolute;inset:0;background:linear-gradient(120deg,#7e22ce,#db2777,#f59e0b);opacity:.9;}
.newsletter-content{position:relative;max-width:560px;margin:0 auto;padding:48px 16px;text-align:center;}
.newsletter-icon{font-size:30px;margin-bottom:12px;}
.newsletter-title{font-size:24px;font-weight:800;margin-bottom:8px;}
.newsletter-desc{color:rgba(255,255,255,.9);margin-bottom:24px;font-size:14px;}
.newsletter-form{display:flex;flex-direction:column;gap:12px;max-width:380px;margin:0 auto;}
.newsletter-input{padding:12px 16px;border-radius:8px;border:none;background:rgba(255,255,255,.95);color:#18181b;outline:2px solid transparent;font-size:14px;}
.newsletter-input:focus{outline-color:#fff;}
.newsletter-btn{padding:12px 24px;border-radius:8px;background:#09090b;color:#fff;font-weight:700;}
.newsletter-success{font-size:15px;font-weight:600;background:rgba(255,255,255,.15);border-radius:8px;padding:12px 16px;display:inline-block;}
@media(min-width:640px){.newsletter-form{flex-direction:row;}}

/* FOOTER */
.footer{padding:40px 0;}
.footer-grid{display:grid;grid-template-columns:1fr;gap:28px;}
.footer-col h3{font-size:14px;font-weight:700;margin-bottom:12px;}
.footer-link{font-size:14px;color:var(--dim);margin-bottom:8px;display:block;text-align:left;}
.footer-link:hover{color:#fff;}
.footer-desc{font-size:14px;color:var(--dim);line-height:1.6;margin:12px 0;}
.social-icons{display:flex;gap:14px;font-size:18px;}
.footer-bottom{border-top:1px solid var(--border);margin-top:28px;padding-top:18px;text-align:center;font-size:12px;color:var(--dimmer);}
@media(min-width:640px){.footer-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1024px){.footer-grid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
<body>

  { id: 24, title: 'Dune: Part Two', year: 2024, type: 'world', genres: ['Sci-Fi','Adventure','Action'], rating: 8.7, runtime: 166, director: 'Denis Villeneuve', cast: ['Timothee Chalamet','Zendaya'], description: "Paul Atreides unites with the Fremen to wage war against those who destroyed his family, while wrestling with a prophesied destiny.", gradient: 'linear-gradient(135deg,#f59e0b,#dc2626)', trending: true, badge: 'New' },
  { id: 25, title: 'Everything Everywhere All at Once', year: 2022, type: 'world', genres: ['Sci-Fi','Comedy','Action'], rating: 8.0, runtime: 140, director: 'Daniels', cast: ['Michelle Yeoh','Ke Huy Quan'], description: "An overwhelmed laundromat owner discovers she must connect with countless versions of herself across the multiverse to save it from collapse.", gradient: 'linear-gradient(135deg,#db2777,#7e22ce)', trending: false },
  { id: 26, title: 'Spider-Man: No Way Home', year: 2021, type: 'world', genres: ['Action','Adventure','Sci-Fi'], rating: 8.2, runtime: 148, director: 'Jon Watts', cast: ['Tom Holland','Zendaya'], description: "When a spell goes wrong, Spider-Man must confront villains from other realities while trying to protect his identity and the people he loves.", gradient: 'linear-gradient(135deg,#2563eb,#06b6d4)', trending: true },
];

const ALL_GENRES = ['All', ...Array.from(new Set(MOVIES.flatMap(m => m.genres))).sort()];

function formatRuntime(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h + 'h ' + m + 'm';
}

function MovieCard({ movie, onSelect, inWatchlist, onToggle, rank }) {
  return (
    <div className="card" onClick={() => onSelect(movie)}>
      <div className="poster-wrap">
        <div className="poster-bg" style={{background: movie.gradient}}>🎬</div>
        <div className="poster-shade"></div>
        <button className={"poster-bookmark" + (inWatchlist ? " active" : "")} onClick={(e) => { e.stopPropagation(); onToggle(movie.id); }}>🔖</button>
        {movie.badge && <div className="poster-tagbadge">{movie.badge}</div>}
        {rank && <div className="poster-rank">{rank}</div>}
        <div className="poster-info">
          <div className="poster-title">{movie.title}</div>
          <div className="poster-year">{movie.year}</div>
        </div>
        <div className="poster-rating">⭐ {movie.rating}</div>
        <div className="poster-play"><div className="poster-play-btn">▶</div></div>
      </div>
      <div className="card-meta">
        <div className="card-title">{movie.title}</div>
        <div className="card-sub">{movie.year} &middot; {movie.genres[0]}</div>
      </div>
    </div>
  );
}

function SectionHeader({ icon, title, onViewAll }) {
  return (
    <div className="section-header">
      <h2 className="section-title">{icon} {title}</h2>
      {onViewAll && <button className="view-all" onClick={onViewAll}>View All &rsaquo;</button>}
    </div>
  );
}

function Grid({ movies, onSelect, watchlist, onToggle, ranked }) {
  if (movies.length === 0) {
    return (
      <div className="empty">
        <div className="empty-icon">🎬</div>
        <div className="empty-title">No movies found</div>
        <div className="empty-sub">Try adjusting your search or filters.</div>
      </div>
    );
  }
  return (
    <div className="grid">
      {movies.map((m, i) => <MovieCard key={m.id} movie={m} onSelect={onSelect} inWatchlist={watchlist.includes(m.id)} onToggle={onToggle} rank={ranked ? i + 1 : null} />)}
    </div>
  );
}

function MovieModal({ movie, onClose, inWatchlist, onToggle }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-hero" style={{background: movie.gradient}}>
          <button className="modal-close" onClick={onClose}>✕</button>
          <div className="modal-shade"></div>
          <div className="modal-titlewrap">
            <div className="modal-tags">
              <span className="tag tag-soft">{movie.type === 'srilanka' ? 'Sri Lankan Cinema' : 'World Cinema'}</span>
              {movie.badge && <span className="tag tag-featured">{movie.badge}</span>}
            </div>
            <h2 className="modal-title">{movie.title}</h2>
          </div>
        </div>
        <div className="modal-body">
          <div className="modal-meta">
            <span className="rating">⭐ {movie.rating}/10</span>
            <span>{movie.year}</span>
            <span>🕐 {formatRuntime(movie.runtime)}</span>
          </div>
          <div className="genre-tags">
            {movie.genres.map(g => <span key={g} className="genre-tag">{g}</span>)}
          </div>
          <p className="modal-desc">{movie.description}</p>
          <div className="modal-row"><b>Director:</b> {movie.director}</div>
          <div className="modal-row"><b>Cast:</b> {movie.cast.join(', ')}</div>
          <div className="modal-actions">
            <button className="btn btn-white">▶ Watch Trailer</button>
            <button className={"btn " + (inWatchlist ? "btn-gradient" : "btn-outline")} onClick={() => onToggle(movie.id)}>
              🔖 {inWatchlist ? 'In Watchlist' : 'Add to Watchlist'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function MovieApp() {
  const [search, setSearch] = useState('');
  const [category, setCategory] = useState('all');
  const [genre, setGenre] = useState('All');
  const [view, setView] = useState('browse');
  const [selectedMovie, setSelectedMovie] = useState(null);
  const [watchlist, setWatchlist] = useState([]);
  const [menuOpen, setMenuOpen] = useState(false);
  const [email, setEmail] = useState('');
  const [subscribed, setSubscribed] = useState(false);

  const toggleWatchlist = (id) => {
    setWatchlist(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  const goTo = (cat) => {
    setView('browse');
    setCategory(cat);
    setGenre('All');
    setSearch('');
    setMenuOpen(false);
  };

  const isFiltering = search.trim() !== '' || genre !== 'All';

  const filtered = MOVIES.filter(m =>
    (category === 'all' || m.type === category) &&
    (genre === 'All' || m.genres.includes(genre)) &&
    (search.trim() === '' || m.title.toLowerCase().includes(search.trim().toLowerCase()))
  );

  const featured = MOVIES.find(m => m.badge === 'Featured') || MOVIES[0];
  const trending = MOVIES.filter(m => m.trending);
  const topRated = [...MOVIES].sort((a, b) => b.rating - a.rating).slice(0, 6);
  const srilankaPreview = MOVIES.filter(m => m.type === 'srilanka').slice(0, 6);
  const worldPreview = MOVIES.filter(m => m.type === 'world').slice(0, 6);
  const newReleases = MOVIES.filter(m => m.year >= 2023);
  const watchlistMovies = MOVIES.filter(m => watchlist.includes(m.id));

  return (
    <div>
      <nav className="navbar">
        <div className="container navbar-inner">
          <button className="logo" onClick={() => goTo('all')}>
            <span className="logo-icon">🎬</span>
            <span>Cine<span className="gradient-text">Lanka</span></span>
          </button>
          <div className="nav-links">
            <button className={"nav-link" + (view === 'browse' && category === 'all' ? " active" : "")} onClick={() => goTo('all')}>Home</button>
            <button className={"nav-link" + (view === 'browse' && category === 'srilanka' ? " active" : "")} onClick={() => goTo('srilanka')}>Sri Lankan Cinema</button>
            <button className={"nav-link" + (view === 'browse' && category === 'world' ? " active" : "")} onClick={() => goTo('world')}>World Cinema</button>
            <button className={"nav-link" + (view === 'watchlist' ? " active" : "")} onClick={() => { setView('watchlist'); setMenuOpen(false); }}>
              My List {watchlist.length > 0 && <span className="badge-count">{watchlist.length}</span>}
            </button>
          </div>
          <div className="search-wrap">
            <span className="search-icon">🔍</span>
            <input className="search-input" value={search} onChange={(e) => { setSearch(e.target.value); setView('browse'); }} placeholder="Search movies..." />
            {search && <button className="search-clear" onClick={() => setSearch('')}>✕</button>}
          </div>
          <button className="signin-btn">Sign In</button>
          <button className="menu-btn" onClick={() => setMenuOpen(!menuOpen)}>{menuOpen ? '✕' : '☰'}</button>
        </div>
        {menuOpen && (
          <div className="mobile-menu">
            <div className="mobile-search">
              <span className="search-icon">🔍</span>
              <input className="search-input" value={search} onChange={(e) => { setSearch(e.target.value); setView('browse'); }} placeholder="Search movies..." />
            </div>
            <button className="nav-link" onClick={() => goTo('all')}>Home</button>
            <button className="nav-link" onClick={() => goTo('srilanka')}>Sri Lankan Cinema</button>
            <button className="nav-link" onClick={() => goTo('world')}>World Cinema</button>
            <button className="nav-link" onClick={() => { setView('watchlist'); setMenuOpen(false); }}>My List ({watchlist.length})</button>
            <button className="signin-btn" style={{display: 'block'}}>Sign In</button>
          </div>
        )}
      </nav>

      {view === 'browse' && category === 'all' && !isFiltering && (
        <>
          <section className="hero">
            <div className="hero-bg" style={{background: featured.gradient}}></div>
            <div className="hero-blob hero-blob1"></div>
            <div className="hero-blob hero-blob2"></div>
            <div className="container">
              <div className="hero-content">
                <div className="hero-tags">
                  <span className="tag tag-featured">FEATURED</span>
                  <span className="tag tag-soft">Sri Lankan Cinema</span>
                </div>
                <h1 className="hero-title">{featured.title}</h1>
                <div className="hero-meta">
                  <span className="rating">⭐ {featured.rating}/10</span>
                  <span>{featured.year}</span>
                  <span>🕐 {formatRuntime(featured.runtime)}</span>
                </div>
                <p className="hero-desc">{featured.description}</p>
                <div className="hero-buttons">
                  <button className="btn btn-white" onClick={() => setSelectedMovie(featured)}>▶ Watch Trailer</button>
                  <button className="btn btn-outline" onClick={() => toggleWatchlist(featured.id)}>
                    🔖 {watchlist.includes(featured.id) ? 'In Watchlist' : 'Add to Watchlist'}
                  </button>
                </div>
              </div>
            </div>
          </section>
          <section className="stats">
            <div className="container stats-grid">
              <div><div className="stat-num">10,000+</div><div className="stat-label">Movies & Shows</div></div>
              <div><div className="stat-num">500+</div><div className="stat-label">Sri Lankan Films</div></div>
              <div><div className="stat-num">1.2M</div><div className="stat-label">Active Users</div></div>
              <div><div className="stat-num">4.9/5</div><div className="stat-label">User Rating</div></div>
            </div>
          </section>
        </>
      )}

      {view === 'browse' && (
        <div className="container" style={{paddingTop: '24px'}}>
          <div className="tabs">
            <button className={"tab" + (category === 'all' ? " active" : "")} onClick={() => { setCategory('all'); setSearch(''); }}>All</button>
            <button className={"tab" + (category === 'srilanka' ? " active" : "")} onClick={() => { setCategory('srilanka'); setSearch(''); }}>🇱🇰 Sri Lankan Cinema</button>
            <button className={"tab" + (category === 'world' ? " active" : "")} onClick={() => { setCategory('world'); setSearch(''); }}>🌍 World Cinema</button>
          </div>
          <div className="chips">
            {ALL_GENRES.map(g => <button key={g} className={"chip" + (genre === g ? " active" : "")} onClick={() => setGenre(g)}>{g}</button>)}
          </div>
        </div>
      )}

      <main>
        {view === 'watchlist' ? (
          <div className="section">
            <SectionHeader icon="🔖" title="My Watchlist" />
            {watchlistMovies.length === 0 ? (
              <div className="empty">
                <div className="empty-icon">🔖</div>
                <div className="empty-title">Your watchlist is empty</div>
                <div className="empty-sub">Tap the bookmark icon on any movie to save it here.</div>
                <button className="btn btn-gradient" onClick={() => goTo('all')}>Browse Movies</button>
              </div>
            ) : (
              <Grid movies={watchlistMovies} onSelect={setSelectedMovie} watchlist={watchlist} onToggle={toggleWatchlist} />
            )}
          </div>
        ) : isFiltering || category !== 'all' ? (
          <div className="section">
            <SectionHeader
              icon={isFiltering ? '🔍' : category === 'srilanka' ? '🇱🇰' : '🌍'}
              title={isFiltering ? "Results (" + filtered.length + ")" : category === 'srilanka' ? 'Sri Lankan Cinema' : 'World Cinema'}
            />
            <Grid movies={filtered} onSelect={setSelectedMovie} watchlist={watchlist} onToggle={toggleWatchlist} />
          </div>
        ) : (
          <>
            <div className="section">
              <SectionHeader icon="📈" title="Trending Now" />
              <Grid movies={trending} onSelect={setSelectedMovie} watchlist={watchlist} onToggle={toggleWatchlist} />
            </div>
            <div className="section">
              <SectionHeader icon="🏆" title="Top Rated" />
              <Grid movies={topRated} onSelect={setSelectedMovie} watchlist={watchlist} onToggle={toggleWatchlist} ranked />
            </div>
            <div className="section">
              <SectionHeader icon="🇱🇰" title="Sri Lankan Cinema" onViewAll={() => goTo('srilanka')} />
              <Grid movies={srilankaPreview} onSelect={setSelectedMovie} watchlist={watchlist} onToggle={toggleWatchlist} />
            </div>
            <div className="section">
              <SectionHeader icon="🌍" title="World Cinema" onViewAll={() => goTo('world')} />
              <Grid movies={worldPreview} onSelect={setSelectedMovie} watchlist={watchlist} onToggle={toggleWatchlist} />
            </div>
            <div className="section">
              <SectionHeader icon="🎬" title="New Releases" />
              <Grid movies={newReleases} onSelect={setSelectedMovie} watchlist={watchlist} onToggle={toggleWatchlist} />
            </div>
          </>
        )}
      </main>

      <section className="newsletter">
        <div className="newsletter-bg"></div>
        <div className="newsletter-content">
          <div className="newsletter-icon">✉️</div>
          <h2 className="newsletter-title">Never Miss a Premiere</h2>
          <p className="newsletter-desc">Get weekly updates on new Sri Lankan releases, world cinema picks, and exclusive trailers.</p>
          {subscribed ? (
            <p className="newsletter-success">You're subscribed! Welcome to CineLanka 🎬</p>
          ) : (
            <div className="newsletter-form">
              <input className="newsletter-input" value={email} onChange={(e) => setEmail(e.target.value)} type="email" placeholder="Enter your email" />
              <button className="newsletter-btn" onClick={() => { if (email.trim()) setSubscribed(true); }}>Subscribe</button>
            </div>
          )}
        </div>
      </section>

      <footer className="footer">
        <div className="container footer-grid">
          <div className="footer-col">
            <div className="logo" style={{marginBottom: '4px'}}>
              <span className="logo-icon">🎬</span>
              <span>Cine<span className="gradient-text">Lanka</span></span>
            </div>
            <p className="footer-desc">Your home for Sri Lankan and world cinema — discover, rate, and track everything you watch.</p>
            <div className="social-icons">
              <span>📘</span><span>📷</span><span>🐦</span><span>▶️</span>
            </div>
          </div>
          <div className="footer-col">
            <h3>Browse</h3>
            <button className="footer-link" onClick={() => goTo('all')}>Home</button>
            <button className="footer-link" onClick={() => goTo('srilanka')}>Sri Lankan Cinema</button>
            <button className="footer-link" onClick={() => goTo('world')}>World Cinema</button>
            <button className="footer-link" onClick={() => setView('watchlist')}>My Watchlist</button>
          </div>
          <div className="footer-col">
            <h3>Popular Genres</h3>
            {['Drama','Action','Thriller','Sci-Fi','Comedy'].map(g => (
              <button key={g} className="footer-link" onClick={() => { setCategory('all'); setGenre(g); setView('browse'); }}>{g}</button>
            ))}
          </div>
          <div className="footer-col">
            <h3>Company</h3>
            <span className="footer-link">About Us</span>
            <span className="footer-link">Careers</span>
            <span className="footer-link">Contact</span>
            <span className="footer-link">Privacy Policy</span>
          </div>
        </div>
        <div className="footer-bottom">© 2026 CineLanka. All rights reserved. Built for movie lovers in Sri Lanka and beyond.</div>
      </footer>

      {selectedMovie && (
        <MovieModal movie={selectedMovie} onClose={() => setSelectedMovie(null)} inWatchlist={watchlist.includes(selectedMovie.id)} onToggle={toggleWatchlist} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MovieApp />);
</script>
</body>
</html>
